services:
  db:
    image: mariadb:11
    container_name: telco_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root1234
      MARIADB_DATABASE: telco_churn_db
      MARIADB_USER: appuser
      MARIADB_PASSWORD: app1234
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d

  model_api:
    build:
      context: .
      dockerfile: model_api/Dockerfile
    container_name: telco_model_api
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: app1234
      DB_NAME: telco_churn_db
      MODEL_API_URL: http://model_api:8001
    ports:
      - "8001:8001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: telco_backend
    restart: always
    depends_on:
      - db
      - model_api
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: app1234
      DB_NAME: telco_churn_db
      MODEL_API_URL: http://model_api:8001
    ports:
      - "8000:8000"

  init_data:
    build:
      context: .
      dockerfile: init.Dockerfile
    container_name: telco_init_data
    depends_on:
      - db
      - model_api
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: app1234
      DB_NAME: telco_churn_db
    restart: "no"

volumes:
  mariadb_data: